services:
  minio:
    container_name: meteo_minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meteo_net

  minio-init:
    container_name: meteo_minio_init
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set meteo http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb meteo/tpch --ignore-existing;
      mc mb meteo/warehouse --ignore-existing;
      echo 'Buckets created successfully';
      "
    networks:
      - meteo_net

  duckdb-server:
    container_name: meteo_duckdb
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_URL_STYLE: ${MINIO_URL_STYLE:-path}
      QUACK_PORT: ${QUACK_PORT:-9494}
      QUACK_HOST: ${QUACK_HOST:-0.0.0.0}
      QUACK_TOKEN: ${QUACK_TOKEN:-meteo-dev-token}
      DUCKDB_MEMORY_LIMIT: ${DUCKDB_MEMORY_LIMIT:-6GB}
      DUCKDB_THREADS: ${DUCKDB_THREADS:-4}
      BOOTSTRAP_DATA: ${BOOTSTRAP_DATA:-true}
      TPCH_SCALE_FACTOR: ${TPCH_SCALE_FACTOR:-0.1}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "9494:9494"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    networks:
      - meteo_net

networks:
  meteo_net:
    driver: bridge
